permissions:
  id-token: write
  contents: read

name: Build and deploy Node.js app to Azure Web App - FlahyCDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Set Node.js version
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build Next.js app
      - name: Build project
        run: npm run build

      # 5. Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0DA6935AB7B14834A7BA03C8659CEC89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_20ADBDF5D818455AAA2D9470D17A3EB1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9C799A6B61084EA896EA3C854388054E }}

      # 6. Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'FlahyCDS'
          slot-name: 'Production'
          package: '.'
